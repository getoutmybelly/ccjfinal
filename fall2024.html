const SK = "math282_fall24_v1";
function load(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch{return {};}}
function save(s){try{localStorage.setItem(SK,JSON.stringify(s));}catch{}}

function norm(s){return String(s).toLowerCase().replace(/[$,\s]/g,"").replace(/−/g,"-");}
function chk(input,correct,alts=[]){
  const n=norm(input),c=norm(correct);
  return n===c||(alts||[]).some(a=>norm(a)===n);
}

function Tag({color,bg,children}){
  return <span style={{fontSize:11,fontWeight:500,padding:"2px 7px",borderRadius:20,background:bg,color,marginLeft:6}}>{children}</span>;
}

function MCCard({q,onScore,saved}){
  const [sel,setSel]=useState(saved?.sel??null);
  const [done,setDone]=useState(saved?.done??false);
  function submit(){if(sel===null)return;setDone(true);onScore(q.id,sel===q.correct,{sel,done:true});}
  function reset(){setSel(null);setDone(false);onScore(q.id,null,null);}
  const correct=done?sel===q.correct:null;
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:8,overflow:"hidden"}}>
      <div style={{padding:"10px 14px"}}>
        <div style={{fontSize:13,fontWeight:500,color:C.text,marginBottom:10}}><b>{q.id}.</b> {q.q}</div>
        {q.opts.map((opt,i)=>{
          let bg="#f5f5f2",border=`1px solid ${C.border}`,col=C.text;
          if(done){
            if(i===q.correct){bg=C.greenBg;border=`1px solid ${C.green}`;col=C.green;}
            else if(i===sel&&i!==q.correct){bg=C.redBg;border=`1px solid ${C.red}`;col=C.red;}
          } else if(sel===i){bg=C.blueBg;border=`1px solid ${C.blue}`;col=C.blue;}
          return (
            <div key={i} onClick={()=>!done&&setSel(i)}
              style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:7,
                      marginBottom:4,background:bg,border,cursor:done?"default":"pointer",color:col,fontSize:13}}>
              <span style={{fontWeight:500,minWidth:16}}>{i+1}.</span>{opt}
              {done&&i===q.correct&&<span style={{marginLeft:"auto"}}>✓</span>}
              {done&&i===sel&&i!==q.correct&&<span style={{marginLeft:"auto"}}>✗</span>}
            </div>
          );
        })}
        {done&&<div style={{marginTop:8,fontSize:12,color:C.gray,background:C.grayBg,borderRadius:6,padding:"6px 10px"}}>💡 {q.explain}</div>}
      </div>
      <div style={{borderTop:`1px solid ${C.border}`,padding:"8px 14px",display:"flex",gap:8,alignItems:"center"}}>
        {!done
          ?<button onClick={submit} disabled={sel===null}
             style={{fontSize:12,padding:"5px 14px",borderRadius:6,border:`1px solid ${C.border}`,
                     background:sel===null?"#f0f0ee":C.text,color:sel===null?C.muted:"#fff",cursor:sel===null?"default":"pointer"}}>
             Check
           </button>
          :<>
            <Tag color={correct?C.green:C.red} bg={correct?C.greenBg:C.redBg}>{correct?"✓ Correct":"✗ Incorrect"}</Tag>
            <button onClick={reset} style={{fontSize:11,padding:"3px 9px",borderRadius:6,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,cursor:"pointer",marginLeft:4}}>Retry</button>
          </>
        }
      </div>
    </div>
  );
}

function FRCard({q,onScore,saved}){
  const [vals,setVals]=useState(saved?.vals||q.fields.map(()=>""));
  const [results,setResults]=useState(saved?.results||null);
  function doCheck(){
    const res=q.fields.map((f,i)=>chk(vals[i],f.answer,f.alt));
    setResults(res);
    onScore(q.id,res.filter(Boolean).length,q.fields.length,{vals,results:res});
  }
  function reset(){setVals(q.fields.map(()=>""));setResults(null);onScore(q.id,null,q.fields.length,null);}
  const allOk=results&&results.every(Boolean);
  const score=results?results.filter(Boolean).length:null;
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:8,overflow:"hidden"}}>
      <div style={{padding:"10px 14px"}}>
        <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>{q.section}</div>
        <div style={{fontSize:13,color:C.text,marginBottom:10}}>{q.prompt}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:8}}>
          {q.fields.map((f,i)=>{
            let bc=C.border,bg="#f9f9f7";
            if(results){bc=results[i]?C.green:C.red;bg=results[i]?C.greenBg:C.redBg;}
            return (
              <div key={i}>
                <label style={{fontSize:11,color:C.muted,fontWeight:500,display:"block",marginBottom:3}}>{f.label}</label>
                <input value={vals[i]} onChange={e=>{const v=[...vals];v[i]=e.target.value;setVals(v);}}
                  disabled={!!results} placeholder="your answer"
                  style={{width:"100%",padding:"6px 9px",borderRadius:6,border:`1px solid ${bc}`,background:bg,fontSize:13,color:C.text,outline:"none"}}/>
                {results&&!results[i]&&<div style={{fontSize:11,color:C.red,marginTop:2}}>✓ {f.answer}</div>}
              </div>
            );
          })}
        </div>
      </div>
      <div style={{borderTop:`1px solid ${C.border}`,padding:"8px 14px",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        {!results
          ?<button onClick={doCheck}
             style={{fontSize:12,padding:"5px 14px",borderRadius:6,border:`1px solid ${C.border}`,background:C.text,color:"#fff",cursor:"pointer"}}>
             Check
           </button>
          :<>
            <Tag color={allOk?C.green:C.amber} bg={allOk?C.greenBg:C.amberBg}>{score}/{q.fields.length} correct</Tag>
            <button onClick={reset} style={{fontSize:11,padding:"3px 9px",borderRadius:6,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,cursor:"pointer",marginLeft:4}}>Retry</button>
          </>
        }
      </div>
    </div>
  );
}

function Progress({mcs,frs}){
  const mcRight=Object.values(mcs).filter(v=>v===true).length;
  const mcDone=Object.values(mcs).filter(v=>v!==null).length;
  const frTotal=FR.reduce((a,q)=>a+q.fields.length,0);
  const frRight=Object.values(frs).reduce((a,v)=>a+(v||0),0);
  const frDone=Object.values(frs).filter(v=>v!==null).length;
  const cells=[
    ["MC correct",`${mcRight} / ${MC.length}`],
    ["MC attempted",`${mcDone} / ${MC.length}`],
    ["FR fields correct",`${frRight} / ${frTotal}`],
    ["FR attempted",`${frDone} / ${FR.length}`],
  ];
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:12}}>
        {cells.map(([l,v])=>(
          <div key={l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:3}}>{l}</div>
            <div style={{fontSize:22,fontWeight:500,color:C.text}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:12,color:C.muted}}>Scores save automatically in your browser.</div>
    </div>
  );
}

function App(){

  const [mcs,setMcs]=useState({});
  const [mcSaved,setMcSaved]=useState({});
  const [frs,setFrs]=useState({});
  const [frSaved,setFrSaved]=useState({});

  useEffect(()=>{
    const s=load();
    if(s.mcs)setMcs(s.mcs);
    if(s.mcSaved)setMcSaved(s.mcSaved);
    if(s.frs)setFrs(s.frs);
    if(s.frSaved)setFrSaved(s.frSaved);
  },[]);

  function hmc(id,correct,data){
    const nm={...mcs,[id]:correct},nd={...mcSaved,[id]:data};
    setMcs(nm);setMcSaved(nd);save({mcs:nm,mcSaved:nd,frs,frSaved});
  }
  function hfr(id,score,total,data){
    const nm={...frs,[id]:score},nd={...frSaved,[id]:data};
    setFrs(nm);setFrSaved(nd);save({mcs,mcSaved,frs:nm,frSaved:nd});
  }
  function resetAll(){setMcs({});setMcSaved({});setFrs({});setFrSaved({});save({});}

  const tabs=[["mc","Multiple Choice"],["fr","Free Response"],["prog","Progress"]];

  return (
    <div style={{maxWidth:720,margin:"0 auto",fontFamily:"system-ui,sans-serif"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:17,fontWeight:600,color:C.text}}>MATH 282 — Fall 2024 Final Exam</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:2}}>Practice on last semester's exam · same format, different numbers</div>
          <a href="index.html" style={{fontSize:12,color:C.blue,textDecoration:"none"}}>← Spring 2025 Exam</a>
        </div>
        <button onClick={resetAll} style={{fontSize:11,padding:"4px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,cursor:"pointer"}}>Reset all</button>
      </div>

      <div style={{background:C.amberBg,borderRadius:8,padding:"8px 12px",marginBottom:12,border:`1px solid #e8c97a`,fontSize:12,color:C.amber}}>
        ⚠ <b>Key differences from Spring 2025:</b> Fall 2024 uses binomial exact formula (Q6), adds relative frequency tables (Q3), and tests conditional probability from a table (Q7). Same core concepts, worth drilling both.
      </div>

      <div style={{display:"flex",gap:0,marginBottom:16,borderBottom:`1px solid ${C.border}`}}>
        {tabs.map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{fontSize:13,padding:"8px 16px",border:"none",borderBottom:tab===id?`2px solid ${C.text}`:"2px solid transparent",
                    background:"transparent",color:tab===id?C.text:C.muted,cursor:"pointer",fontWeight:tab===id?500:400,marginBottom:-1}}>
            {label}
          </button>
        ))}
      </div>

      {tab==="mc"&&(
        <div>
          <div style={{fontSize:12,color:C.muted,marginBottom:12}}>10 MC questions from Fall 2024 · Select an answer then tap Check.</div>
          {MC.map(q=><MCCard key={q.id} q={q} onScore={hmc} saved={mcSaved[q.id]}/>)}
        </div>
      )}
      {tab==="fr"&&(
        <div>
          <div style={{fontSize:12,color:C.muted,marginBottom:12}}>Free response questions from Fall 2024 · Type your answer and tap Check.</div>
          {FR.map(q=><FRCard key={q.id} q={q} onScore={hfr} saved={frSaved[q.id]}/>)}
        </div>
      )}
      {tab==="prog"&&<Progress mcs={mcs} frs={frs}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
